<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="AutoSphera - Zapisz się na listę oczekujących, premiera wkrótce" />
<title>AutoSphera - Wkrótce Otwarcie</title>
<link rel="icon" type="image/png" href="logo.png">

<style>

@font-face {
  font-family: 'Orbitron';
  src: url('orbitron-bold.woff2') format('woff2');
  font-weight: 700;
  font-display: swap;
}

@font-face {
  font-family: 'Inter';
  src: url('inter-light.woff2') format('woff2');
  font-weight: 300;
  font-display: swap;
}
  
  :root {
    --primary-color: #ffffff;
    --accent-color: hsl(200, 100%, 60%);
  }

  body { 
    margin: 0; 
    padding: 0;
    overflow: hidden; 
    background: #000; 
    font-family: 'Inter', sans-serif;
    color: white;
  }

  canvas { position: fixed; inset: 0; z-index: 1; }

  .overlay {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.6) 100%);
    padding: 20px;
    box-sizing: border-box;
  }

  .shiny-text {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.8rem, 10vw, 5.5rem); 
    font-weight: 700;
    letter-spacing: 2px; 
    margin: 0;
    text-transform: uppercase;
    
    background: linear-gradient(120deg, #b5b5b5 30%, #ffffff 50%, #b5b5b5 70%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    
    animation: shine 3s linear infinite;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
    line-height: 1.1;

    will-change: background-position;
  }

  @keyframes shine {
    0% { background-position: 100% center; }
    100% { background-position: -100% center; }
  }

  p {
    font-size: 1.2rem;
    font-weight: 300;
    opacity: 0.8;
    margin-top: 10px;
    margin-bottom: 2rem;
  }

  .signup-form {
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    padding: 35px 20px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    max-width: 520px; 
    width: 100%;
    box-sizing: border-box;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);

        
  display: flex;         
  flex-direction: column;  
  justify-content: space-between; 
  }



  input[type="email"] {
    width: 100%;
    padding: 15px;
    margin-top: -20px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: none;
    background: rgba(255, 255, 255, 0.9);
    font-size: 1rem;
    box-sizing: border-box;
  }

  button {
    width: 100%;
    padding: 15px;
    border-radius: 10px;
    border: none;
    background: var(--primary-color);
    color: black;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
  }

  button:hover {
    transform: scale(1.02);
    background: #e0e0e0;
  }

  .consent-label {
    display: block;
    font-size: 0.8rem;
    margin-top: 15px;
    color: #999;
    text-align: left;
    cursor: pointer;
  }

  .footer-links {
    text-align: center;
    margin-top: 23px;
    margin-bottom: -24px;
    font-size: 0.7rem;
    opacity: 0.5;
  }

  a { color: white; text-decoration: underline; }

    strong {
        font-family: 'Orbitron', sans-serif;
    }

.fade-out {
  opacity: 0;
  transform: translateY(-10px);
  transition: opacity 0.4s ease, transform 0.4s ease;
  pointer-events: none;
}

.fade-in {
  display: block !important;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeInUp 0.6s forwards ease-out;
}

@keyframes fadeInUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>
</head>
<body>

<canvas id="bg"></canvas>

<main class="overlay">
  <h1 class="shiny-text">AutoSphera</h1>
  <p>Zapisz się, aby dostać powiadomienie o starcie sklepu z <strong>kodem rabatowym</strong> <br><br> Premiera wkrótce.</p>

  <div class="signup-form">
    <form id="waitlistForm" action="https://formspree.io/f/xyknqpwq" method="POST">
    <input type="email" name="email" placeholder="Wpisz swój e-mail" required>
      <button type="submit">POWIADOM MNIE</button>
      <label class="consent-label" for="consent">
        <input type="checkbox" id="consent" name="consent" required> 
        Wyrażam zgodę na przetwarzanie mojego adresu email w celu otrzymania informacji o starcie sklepu zgodnie z polityką prywatności.
      </label>
    </form>
    <div id="form-status" style="display: none; color: #4ade80; margin-top: 15px; font-weight: 700; font-size: 0.9rem;">
      Jesteś na liście! Gdy tylko ruszymy, wyślemy na Twój e-mail informację o starcie oraz kod rabatowy na pierwsze zakupy. Pozdro!
    </div>
    <p class="footer-links">&copy; 2026 AutoSphera | <a href="polityka-prywatnosci/">Polityka Prywatności</a></p>
  </div>
</main>

<script src="script.js" defer></script>
</body>
</html>
