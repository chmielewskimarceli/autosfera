<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AutoSfera - Wkrótce Otwarcie</title>
<link rel="icon" type="image/png" href="logo3.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@300;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary-color: #ffffff;
    --accent-color: hsl(200, 100%, 60%);
  }

  body { 
    margin: 0; 
    padding: 0;
    overflow: hidden; 
    background: #000; 
    font-family: 'Inter', sans-serif;
    color: white;
  }

  canvas { position: fixed; inset: 0; z-index: 1; }

  /* FIX: Warstwa treści - teraz poprawnie centruje wszystko na ekranie */
  .overlay {
    position: relative;
    z-index: 10;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.6) 100%);
    padding: 20px;
    box-sizing: border-box;
  }

  /* Efekt błyszczącego tekstu (Shiny Text) z ReactBits przerobiony na czysty CSS */
  .shiny-text {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2.5rem, 12vw, 5.5rem); 
    font-weight: 700;
    letter-spacing: 2px; 
    margin: 0;
    text-transform: uppercase;
    
    /* Gradient z ReactBits */
    background: linear-gradient(120deg, #b5b5b5 30%, #ffffff 50%, #b5b5b5 70%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    
    animation: shine 3s linear infinite;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
    line-height: 1.1;
  }

  @keyframes shine {
    0% { background-position: 100% center; }
    100% { background-position: -100% center; }
  }

  p {
    font-size: 1.2rem;
    font-weight: 300;
    opacity: 0.8;
    margin-top: 10px;
    margin-bottom: 2rem;
  }

  .signup-form {
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    padding: 35px 20px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    max-width: 520px; 
    width: 100%;
    box-sizing: border-box;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
  }

  input[type="email"] {
    width: 100%;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: none;
    background: rgba(255, 255, 255, 0.9);
    font-size: 1rem;
    box-sizing: border-box;
  }

  button {
    width: 100%;
    padding: 15px;
    border-radius: 10px;
    border: none;
    background: var(--primary-color);
    color: black;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
  }

  button:hover {
    transform: scale(1.02);
    background: #e0e0e0;
  }

  .consent-label {
    display: block;
    font-size: 0.8rem;
    margin-top: 15px;
    color: #999;
    text-align: left;
    cursor: pointer;
  }

  .footer-links {
    position: absolute;
    bottom: 20px;
    font-size: 0.7rem;
    opacity: 0.5;
  }

  a { color: white; text-decoration: underline; }

</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="overlay">
  <h1 class="shiny-text">AutoSfera</h1>
  <p>Zapisz się aby dostać powiadomienie o starcie sklepu. <br> Premiera wkrótce.</p>

  <div class="signup-form">
    <form id="waitlistForm">
      <input type="email" placeholder="Wpisz swój e-mail" required>
      <button type="submit">POWIADOM MNIE</button>
      
      <label class="consent-label">
        <input type="checkbox" required> 
        Wyrażam zgodę na przetwarzanie mojego adresu email w celu otrzymania informacji o starcie sklepu zgodnie z polityką prywatności.
      </label>
    </form>
  </div>

  <div class="footer-links">
    &copy; 2024 AutoSfera | <a href="polityka.html">Polityka Prywatności</a>
  </div>
</div>

<script>
// LOGIKA DYMU (Canvas)
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d", { alpha: false });

let w, h;
let hue = 0;

const smokeCanvas = document.createElement('canvas');
const sCtx = smokeCanvas.getContext('2d');
const smokeSize = 256; 
smokeCanvas.width = smokeSize;
smokeCanvas.height = smokeSize;

const createSmokeTexture = () => {
  const center = smokeSize / 2;
  const grad = sCtx.createRadialGradient(center, center, 0, center, center, center);
  grad.addColorStop(0, "rgba(255,255,255,0.3)");
  grad.addColorStop(0.3, "rgba(180,180,180,0.1)");
  grad.addColorStop(0.6, "rgba(60,60,60,0.02)");
  grad.addColorStop(1, "rgba(0,0,0,0)");
  sCtx.fillStyle = grad;
  sCtx.filter = "blur(14px)"; 
  sCtx.beginPath();
  sCtx.arc(center, center, smokeSize / 3.2, 0, Math.PI * 2);
  sCtx.fill();
};
createSmokeTexture();

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

class SmokeParticle {
  constructor() { this.reset(true); }
  reset(isInitial = false) {
    this.x = w / 2;
    this.y = h + 100;
    const angle = (-Math.PI / 2) + (Math.random() - 0.5) * Math.PI * 1.6;
    const speed = 0.5 + Math.random() * 1.5;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.radius = 60 + Math.random() * 100;
    this.opacity = 0.05 + Math.random() * 0.1;
    this.rotation = Math.random() * Math.PI * 2;
    this.spin = (Math.random() - 0.5) * 0.01;
    this.life = 0;
    this.maxLife = 400 + Math.random() * 500;
    if(isInitial) {
        const skip = Math.random() * 0.9;
        this.life = this.maxLife * skip;
        this.x += this.vx * this.life;
        this.y += this.vy * this.life;
        this.radius += 0.4 * this.life;
    }
  }
  update() {
    this.life++;
    this.x += this.vx;
    this.y += this.vy;
    this.radius += 0.4;
    this.rotation += this.spin;
    if (this.life >= this.maxLife) this.reset(false);
  }
  draw() {
    ctx.globalAlpha = this.opacity;
    ctx.setTransform(1, 0, 0, 1, this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.drawImage(smokeCanvas, -this.radius, -this.radius, this.radius * 2, this.radius * 2);
  }
}

const maxParticles = (w < 768) ? 150 : 350;
const particles = Array.from({ length: maxParticles }, () => new SmokeParticle());

function drawLines() {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.globalAlpha = 0.3;
  const startX = w / 2;
  const startY = h + 120;
  ctx.lineWidth = 1;
  ctx.strokeStyle = `hsl(${hue}, 80%, 50%)`;
  const lineCount = 15; 
  const maxSpread = w * 1.5; 
  for (let i = 0; i < lineCount; i++) {
    const spread = (i / (lineCount - 1) - 0.5) * 2;
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(startX + spread * maxSpread, -500);
    ctx.stroke();
  }
}

function animate() {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, w, h);
  ctx.globalCompositeOperation = 'screen';
  for (let i = 0; i < maxParticles; i++) {
    particles[i].update();
    particles[i].draw();
  }
  ctx.globalCompositeOperation = 'source-over';
  drawLines();
  hue = (hue + 0.15) % 360;
  requestAnimationFrame(animate);
}
animate();

document.getElementById('waitlistForm').onsubmit = (e) => {
  e.preventDefault();
  alert('Dziękujemy! Poinformujemy Cię o starcie Autosfery.');
};
</script>
</body>
</html>
